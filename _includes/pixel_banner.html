<div class="inlp-banner-wrapper">
 <div class="pixel-banner">
  <div class="banner-text-area">
    <h2>{{ include.title }}</h2>
    <p>{{ include.subtitle }}</p>
  </div>

  <div class="banner-art-area">

    <!-- Floating Smoke Puffs -->
    <div class="puff puff-1"></div>
    <div class="puff puff-2"></div>
    <div class="puff puff-3"></div>
    <div class="puff puff-4"></div>

    <!-- SVG Industrial Skyline -->
    <svg viewBox="80 -50 1200 300">
      <!-- Sky -->
      <rect width="1200" height="220" fill="#EAF1F7"/>

      <!-- Sun / industrial light -->
      <g transform="translate(1000 20)">
        <g class="gear-spin">
          <!-- top bottom left right -->
          <rect x="28" y="-18" width="8" height="12" fill="#FFB454"/>
          <rect x="28" y="70" width="8" height="12" fill="#FFB454"/>
          <rect x="-18" y="28" width="12" height="8" fill="#FFB454"/>
          <rect x="70" y="28" width="12" height="8" fill="#FFB454"/>
        </g>
        <!-- Sun body -->
        <g>
          <rect x="12" y="0" width="40" height="8" fill="#FFB454"/>
          <rect x="4" y="8" width="56" height="8" fill="#FFB454"/>
          <rect x="0" y="16" width="64" height="32" fill="#FFB454"/>
          <rect x="4" y="48" width="56" height="8" fill="#FFB454"/>
          <rect x="12" y="56" width="40" height="8" fill="#FFB454"/>
        </g>
      </g>

      <!-- Clouds -->
      <g class="cloud-move">
        <g class="cloud-bounce">
          <g fill="#ffffff">
            <rect x="450" y="30" width="15" height="20"/>
            <rect x="500" y="40" width="30" height="10"/>
            <rect x="530" y="30" width="40" height="20"/>
            <rect x="570" y="40" width="30" height="10"/>
            <rect x="900" y="50" width="30" height="10"/>
            <rect x="930" y="40" width="40" height="20"/>
            <rect x="970" y="50" width="50" height="10"/>
          </g>
        </g>
      </g>

      <!-- Ground -->
      <rect x="0" y="160" width="1200" height="60" fill="#9FB1C2"/>

      <!-- Pavement strip -->
      <rect x="300" y="130" width="850" height="30" fill="#C3CFDB"/>

      <!-- Distant skyline buildings -->
      <g fill="#D5DEE7">
        <rect x="325" y="100" width="250" height="30" />
        <rect x="350" y="80" width="40" height="30" />
        <rect x="475" y="80" width="50" height="30" />

        <rect x="800" y="100" width="300" height="30" />
        <rect x="900" y="80" width="150" height="30" />
      </g>

      <!-- BACK FACTORIES (silos / tanks) -->
      <g opacity="0.85">
        <!-- left back silo -->
        <g>
          <rect x="430" y="80" width="55" height="80" fill="#7E94A8"/>
          <rect x="430" y="72" width="55" height="10" fill="#5E7488"/>
          <!-- windows -->
          <rect x="440" y="92" width="10" height="10" fill="#BFE3FF"/>
          <rect x="465" y="92" width="10" height="10" fill="#BFE3FF"/>
          <rect x="440" y="112" width="10" height="10" fill="#BFE3FF"/>
          <rect x="465" y="112" width="10" height="10" fill="#BFE3FF"/>
        </g>
        <!-- right back tank -->
        <g>
          <rect x="840" y="85" width="80" height="75" fill="#6E94A2"/>
          <rect x="840" y="78" width="80" height="10" fill="#52727F"/>
          <rect x="852" y="98" width="12" height="12" fill="#BFE3FF"/>
          <rect x="884" y="98" width="12" height="12" fill="#BFE3FF"/>
        </g>
      </g>

      <!-- FOREGROUND STRUCTURES -->
      <g>
        <!-- small warehouse -->
        <rect x="525" y="115" width="65" height="55" fill="#A8B9C8"/>
        <rect x="525" y="108" width="65" height="9" fill="#7E94A8"/>
        <rect x="535" y="128" width="14" height="14" fill="#BFE3FF"/>
        <rect x="565" y="128" width="14" height="14" fill="#BFE3FF"/>

        <!-- blue tank -->
        <rect x="920" y="110" width="80" height="60" fill="#5FA8D0"/>
        <rect x="920" y="103" width="80" height="9" fill="#3F87AF"/>
        <rect x="934" y="124" width="14" height="14" fill="#D7F0FF"/>
        <rect x="968" y="124" width="14" height="14" fill="#D7F0FF"/>

        <!-- small unit -->
        <rect x="1055" y="125" width="65" height="45" fill="#8FA0B0"/>
        <rect x="1055" y="118" width="65" height="9" fill="#6E8092"/>
      </g>

      <!-- MAIN FACTORY with smokestacks -->
      <g class="factory-group">
        <!-- main building -->
        <rect x="560" y="70" width="280" height="105" fill="#6C8499"/>
        <!-- roof saw-tooth -->
        <g fill="#54697C">
          <rect x="560" y="62" width="40" height="10"/>
          <rect x="620" y="62" width="40" height="10"/>
          <rect x="680" y="62" width="40" height="10"/>
          <rect x="740" y="62" width="40" height="10"/>
          <rect x="800" y="62" width="40" height="10"/>
        </g>
        <!-- windows grid -->
        <g fill="#BFE3FF">
          <rect x="580" y="86" width="16" height="16"/>
          <rect x="612" y="86" width="16" height="16"/>
          <rect x="644" y="86" width="16" height="16"/>
          <rect x="676" y="86" width="16" height="16"/>
          <rect x="708" y="86" width="16" height="16"/>
          <rect x="740" y="86" width="16" height="16"/>
          <rect x="772" y="86" width="16" height="16"/>
          <rect x="804" y="86" width="16" height="16"/>

          <rect x="580" y="116" width="16" height="16"/>
          <rect x="612" y="116" width="16" height="16"/>
          <rect x="644" y="116" width="16" height="16"/>
          <rect x="676" y="116" width="16" height="16"/>
          <rect x="708" y="116" width="16" height="16"/>
          <rect x="740" y="116" width="16" height="16"/>
          <rect x="772" y="116" width="16" height="16"/>
          <rect x="804" y="116" width="16" height="16"/>
        </g>
        <!-- door -->
        <rect x="688" y="142" width="32" height="33" fill="#3F4F5E"/>

        <!-- smokestacks -->
        <rect x="600" y="20" width="22" height="50" fill="#54697C"/>
        <rect x="598" y="16" width="26" height="8" fill="#3F4F5E"/>
        <rect x="770" y="10" width="22" height="60" fill="#54697C"/>
        <rect x="768" y="6" width="26" height="8" fill="#3F4F5E"/>
      </g>

      <!-- Foreground crates / barrels -->
      <g>
        <rect x="520" y="150" width="18" height="20" fill="#C58B4E"/>
        <rect x="520" y="150" width="18" height="6" fill="#A06E37"/>

        <rect x="725" y="155" width="20" height="15" fill="#5FA8D0"/>

        <rect x="1085" y="148" width="20" height="22" fill="#C58B4E"/>
        <rect x="1085" y="148" width="20" height="6" fill="#A06E37"/>
      </g>

      <!-- Utility poles -->
      <g fill="#54697C">
        <rect x="505" y="120" width="4" height="50"/>
        <rect x="495" y="124" width="24" height="4"/>
        <rect x="1146" y="118" width="4" height="52"/>
        <rect x="1136" y="122" width="24" height="4"/>
      </g>

    </svg>

  </div>
 </div>
</div>
